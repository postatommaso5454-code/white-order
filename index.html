<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c6426e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="White Order" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <title>White Order - Comande Offline</title>
  <style>
    :root {
      --bg: #fff7fb;
      --paper: #ffffff;
      --paper-2: #fff0f5;
      --ink: #2b2430;
      --muted: #786d78;
      --line: #ead7df;
      --brand: #c6426e;
      --brand-2: #f7d8e4;
      --good: #108a52;
      --warn: #d98200;
      --danger: #c3212d;
      --blue: #2765c7;
      --shadow: 0 10px 30px rgba(91, 37, 58, .13);
      --radius: 22px;
      --tap: 52px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif; }
    body { overflow-x: hidden; }
    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; touch-action: manipulation; }

    .app-shell { min-height: 100svh; padding: calc(12px + var(--safe-top)) 12px calc(86px + var(--safe-bottom)); display: grid; gap: 12px; max-width: 1120px; margin: 0 auto; }

    .topbar { position: sticky; top: 0; z-index: 50; background: linear-gradient(180deg, rgba(255,247,251,.98), rgba(255,247,251,.9)); backdrop-filter: blur(12px); border: 1px solid var(--line); border-radius: 24px; box-shadow: var(--shadow); padding: 10px; display: grid; grid-template-columns: 112px 1fr auto; gap: 8px; align-items: center; }
    .table-input { height: var(--tap); border: 2px solid var(--brand-2); border-radius: 18px; padding: 0 12px; font-size: 18px; font-weight: 800; width: 100%; background: #fff; color: var(--ink); }
    .search { height: var(--tap); border: 2px solid var(--brand-2); border-radius: 18px; padding: 0 14px; font-size: 17px; font-weight: 700; background: #fff; color: var(--ink); }
    .top-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn, .small-btn { min-height: var(--tap); border-radius: 18px; background: var(--paper); color: var(--ink); border: 1px solid var(--line); font-weight: 900; padding: 0 14px; box-shadow: 0 4px 12px rgba(91, 37, 58, .08); }
    .icon-btn.primary, .small-btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }

    .status-pill { display: inline-flex; gap: 6px; align-items: center; padding: 6px 10px; border-radius: 999px; font-weight: 900; font-size: 12px; white-space: nowrap; }
    .status-draft { background: #fff0cd; color: #785000; }
    .status-confirmed { background: #e8fff3; color: #00683a; }
    .status-modified { background: #ffe7cc; color: #8a4200; }
    .status-closed { background: #e8ecf5; color: #384051; }

    .layout { display: grid; grid-template-columns: 1fr 390px; gap: 12px; align-items: start; }
    .panel { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .panel-head { padding: 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; border-bottom: 1px solid var(--line); }
    .panel-title { margin: 0; font-size: 18px; font-weight: 1000; letter-spacing: -.02em; }
    .panel-body { padding: 12px; }

    .category-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 12px; scrollbar-width: none; }
    .category-scroll::-webkit-scrollbar { display: none; }
    .cat-btn { flex: 0 0 auto; min-height: 46px; border-radius: 16px; padding: 0 14px; background: #fff; border: 1px solid var(--line); font-weight: 1000; color: var(--ink); }
    .cat-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }

    .recent-strip { padding: 0 12px 12px; display: none; }
    .recent-strip.show { display: block; }
    .recent-title { font-size: 12px; font-weight: 1000; color: var(--muted); margin: 2px 0 8px; text-transform: uppercase; letter-spacing: .06em; }
    .recent-list { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .recent-list::-webkit-scrollbar { display: none; }
    .recent-btn { flex: 0 0 auto; min-height: 44px; border-radius: 15px; background: #fff5e0; color: #5a3900; border: 1px solid #f2d99b; font-weight: 1000; padding: 0 12px; }

    .product-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .product { position: relative; min-height: 92px; text-align: left; border-radius: 18px; padding: 12px; background: linear-gradient(180deg, #fff, #fff9fb); border: 1px solid var(--line); color: var(--ink); box-shadow: 0 4px 15px rgba(91, 37, 58, .07); display: flex; flex-direction: column; justify-content: space-between; gap: 8px; }
    .product:active { transform: scale(.985); }
    .product-name { font-size: 16px; font-weight: 1000; line-height: 1.1; }
    .product-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .price { font-weight: 1000; color: var(--brand); }
    .tag { font-size: 11px; font-weight: 1000; padding: 4px 7px; border-radius: 999px; background: var(--brand-2); color: var(--brand); }
    .desc { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.25; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .empty { color: var(--muted); font-weight: 800; text-align: center; padding: 28px 12px; }

    .order-panel { position: sticky; top: 86px; }
    .order-list { display: grid; gap: 8px; }
    .order-row { border: 1px solid var(--line); border-radius: 18px; background: #fff; padding: 10px; display: grid; gap: 8px; }
    .row-main { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; }
    .row-title { font-weight: 1000; font-size: 15px; }
    .row-sub { color: var(--muted); font-weight: 700; font-size: 12px; line-height: 1.35; margin-top: 3px; white-space: pre-wrap; }
    .row-price { font-weight: 1000; color: var(--brand); white-space: nowrap; }
    .row-actions { display: grid; grid-template-columns: 50px 50px 1fr 50px; gap: 6px; }
    .row-actions button { min-height: 40px; border-radius: 13px; font-weight: 1000; background: var(--paper-2); color: var(--ink); }
    .row-actions .danger { background: #ffe9ec; color: var(--danger); }
    .row-actions .edit { background: #eaf1ff; color: var(--blue); }
    .order-total { display: flex; align-items: center; justify-content: space-between; font-size: 20px; font-weight: 1000; padding: 12px; border-radius: 18px; background: var(--paper-2); margin-top: 10px; }
    .big-actions { display: grid; gap: 8px; margin-top: 10px; }
    .big-btn { min-height: 52px; border-radius: 18px; font-size: 16px; font-weight: 1000; background: var(--brand); color: #fff; }
    .big-btn.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
    .big-btn.good { background: var(--good); }
    .big-btn.warn { background: var(--warn); }
    .big-btn.danger { background: var(--danger); }
    .big-btn.blue { background: var(--blue); }
    .compact-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; z-index: 80; padding: 8px 12px calc(8px + var(--safe-bottom)); background: rgba(255, 247, 251, .92); backdrop-filter: blur(14px); border-top: 1px solid var(--line); display: none; gap: 8px; }
    .bottom-nav button { flex: 1; min-height: 52px; border-radius: 18px; background: #fff; border: 1px solid var(--line); color: var(--ink); font-weight: 1000; box-shadow: 0 5px 15px rgba(91, 37, 58, .10); }
    .bottom-nav button.active { background: var(--brand); color: #fff; border-color: var(--brand); }

    .drawer { position: fixed; inset: 0; z-index: 100; background: rgba(43, 36, 48, .42); display: none; align-items: flex-end; }
    .drawer.show { display: flex; }
    .sheet { width: 100%; max-height: 88svh; overflow: auto; background: var(--bg); border-radius: 28px 28px 0 0; padding: 14px 12px calc(14px + var(--safe-bottom)); box-shadow: 0 -20px 60px rgba(0,0,0,.22); }
    .sheet-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
    .sheet-title { margin: 0; font-size: 22px; font-weight: 1000; letter-spacing: -.03em; }
    .close-btn { width: 44px; height: 44px; border-radius: 15px; background: #fff; border: 1px solid var(--line); font-weight: 1000; }
    .option-group { background: #fff; border: 1px solid var(--line); border-radius: 20px; padding: 12px; margin: 10px 0; }
    .option-title { margin: 0 0 8px; font-size: 15px; font-weight: 1000; }
    .option-title small { color: var(--muted); font-weight: 900; }
    .option-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .option-chip { min-height: 48px; border-radius: 15px; background: #fff; border: 2px solid var(--line); color: var(--ink); font-weight: 1000; padding: 8px; text-align: left; }
    .option-chip.selected { border-color: var(--brand); background: var(--brand-2); color: var(--brand); }
    .option-price { color: var(--muted); font-size: 12px; font-weight: 900; }
    .note-area { width: 100%; min-height: 84px; resize: vertical; border: 2px solid var(--line); border-radius: 18px; padding: 12px; background: #fff; color: var(--ink); font-weight: 700; }

    .history-list, .open-orders { display: grid; gap: 8px; }
    .history-card { background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 12px; display: grid; gap: 8px; }
    .history-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .history-title { font-weight: 1000; font-size: 16px; }
    .history-meta { color: var(--muted); font-size: 12px; font-weight: 800; }
    .history-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .history-actions button { min-height: 42px; border-radius: 14px; font-weight: 1000; background: var(--paper-2); color: var(--ink); }
    .history-actions .danger { color: var(--danger); background: #ffe9ec; }
    .history-actions .blue { color: var(--blue); background: #eaf1ff; }

    .toast { position: fixed; z-index: 200; left: 50%; bottom: calc(76px + var(--safe-bottom)); transform: translateX(-50%) translateY(20px); opacity: 0; transition: .22s; pointer-events: none; background: #2b2430; color: #fff; padding: 10px 14px; border-radius: 999px; font-weight: 1000; box-shadow: 0 10px 25px rgba(0,0,0,.18); }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .confirm-view { background: #fff; border: 1px dashed var(--brand); border-radius: 18px; padding: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; white-space: pre-wrap; line-height: 1.35; font-weight: 800; }
    .hidden { display: none !important; }

    /* iPhone / mobile: mantiene l'aspetto ordinato del desktop, ma in verticale */
    @media (max-width: 860px) {
      :root { --radius: 20px; --tap: 48px; }
      html, body { width: 100%; overflow-x: hidden; }
      .app-shell {
        width: 100%;
        max-width: 100%;
        padding: calc(8px + var(--safe-top)) 8px calc(78px + var(--safe-bottom));
        gap: 10px;
      }

      .topbar {
        top: 6px;
        grid-template-columns: minmax(84px, 96px) minmax(0, 1fr) auto;
        grid-template-areas:
          "table search actions";
        gap: 7px;
        padding: 8px;
        border-radius: 20px;
      }
      .table-input { grid-area: table; }
      .search { grid-area: search; min-width: 0; }
      .top-actions { grid-area: actions; gap: 6px; }
      .table-input, .search { height: 48px; font-size: 16px; border-radius: 16px; }
      .small-btn, .icon-btn { min-height: 48px; border-radius: 16px; padding: 0 10px; }
      .top-actions .small-btn.primary { padding: 0 12px; }
      .top-actions .icon-btn { width: 48px; padding: 0; }

      .layout { display: block; }
      .panel { border-radius: 20px; box-shadow: 0 8px 24px rgba(91, 37, 58, .10); }
      .panel-head { padding: 12px; }
      .panel-title { font-size: 17px; }
      .panel-body { padding: 10px; }
      .status-pill { font-size: 11px; padding: 5px 8px; }

      .category-scroll {
        padding: 10px;
        gap: 7px;
        scroll-snap-type: x proximity;
      }
      .cat-btn {
        min-height: 42px;
        padding: 0 12px;
        border-radius: 15px;
        font-size: 14px;
        scroll-snap-align: start;
      }
      .recent-strip { padding: 0 10px 10px; }
      .recent-btn { min-height: 42px; border-radius: 14px; font-size: 14px; }

      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .product {
        min-height: 92px;
        padding: 10px;
        border-radius: 17px;
        box-shadow: 0 3px 12px rgba(91, 37, 58, .06);
      }
      .product-name { font-size: 15px; line-height: 1.13; }
      .product-meta { gap: 6px; }
      .price { font-size: 14px; }
      .tag { font-size: 10px; padding: 3px 6px; }
      .desc { display: none; }

      .order-panel { position: static; display: none; margin-top: 10px; max-width: none; }
      body.mobile-cart .menu-panel { display: none; }
      body.mobile-cart .order-panel { display: block; }
      body.mobile-history .menu-panel, body.mobile-history .order-panel { display: none; }
      body.mobile-history .history-panel { display: block !important; }
      .history-panel { display: none; margin-top: 10px; }

      .order-row { border-radius: 16px; padding: 9px; }
      .row-title { font-size: 14px; }
      .row-sub { font-size: 12px; }
      .row-actions { grid-template-columns: 44px 44px 1fr 44px; gap: 6px; }
      .row-actions button { min-height: 40px; border-radius: 12px; }
      .order-total { font-size: 18px; padding: 11px; border-radius: 16px; }
      .big-btn { min-height: 48px; border-radius: 16px; font-size: 15px; }
      .compact-actions { gap: 7px; }

      .bottom-nav {
        display: flex;
        padding: 8px 10px calc(8px + var(--safe-bottom));
      }
      .bottom-nav button {
        min-height: 50px;
        border-radius: 16px;
        font-size: 13px;
      }

      .sheet {
        max-height: 90svh;
        border-radius: 24px 24px 0 0;
        padding: 12px 10px calc(12px + var(--safe-bottom));
      }
      .option-list { grid-template-columns: 1fr; }
      .option-chip { min-height: 48px; }
      .history-actions { grid-template-columns: 1fr; }
      .toast { max-width: calc(100vw - 24px); text-align: center; }
    }

    @media (max-width: 430px) {
      .topbar {
        grid-template-columns: 88px minmax(0, 1fr) auto;
      }
      .search { font-size: 15px; padding: 0 10px; }
      .top-actions .small-btn.primary { font-size: 13px; padding: 0 10px; }
      .top-actions .icon-btn { width: 44px; min-height: 44px; }
      .table-input { font-size: 15px; padding: 0 9px; }
      .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .product { min-height: 88px; }
      .product-name { font-size: 14px; }
      .bottom-nav button { font-size: 12px; }
    }

    @media (max-width: 360px) {
      .topbar {
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "table actions"
          "search search";
      }
      .top-actions .small-btn.primary { min-width: 72px; }
      .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar" aria-label="Barra principale">
      <input id="tableInput" class="table-input" type="text" inputmode="numeric" autocomplete="off" placeholder="Tavolo" aria-label="Numero tavolo" />
      <input id="searchInput" class="search" type="search" autocomplete="off" placeholder="Cerca nel menù..." aria-label="Cerca prodotto" />
      <div class="top-actions">
        <button id="newOrderBtn" class="small-btn primary" type="button">Nuovo</button>
        <button id="historyTopBtn" class="icon-btn" type="button" aria-label="Storico">📜</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel menu-panel" aria-label="Menù">
        <div class="panel-head">
          <h1 class="panel-title">Menù</h1>
          <span id="currentStatus" class="status-pill status-draft">🟡 In presa</span>
        </div>
        <div id="categoryScroll" class="category-scroll"></div>
        <div id="recentStrip" class="recent-strip">
          <div class="recent-title">🕒 Recenti</div>
          <div id="recentList" class="recent-list"></div>
        </div>
        <div class="panel-body">
          <div id="productGrid" class="product-grid"></div>
          <div id="noResults" class="empty hidden">Nessun prodotto trovato.</div>
        </div>
      </section>

      <aside class="panel order-panel" aria-label="Comanda">
        <div class="panel-head">
          <h2 class="panel-title" id="orderTitle">Comanda</h2>
          <span id="cartCount" class="status-pill status-draft">0 articoli</span>
        </div>
        <div class="panel-body">
          <div id="orderList" class="order-list"></div>
          <div id="emptyOrder" class="empty">Inserisci il tavolo e tocca i prodotti.</div>
          <div id="orderTotal" class="order-total hidden"><span>Totale</span><span id="totalValue">€0,00</span></div>
          <div class="big-actions">
            <button id="showComandaBtn" class="big-btn blue" type="button">Vista comanda</button>
            <button id="confirmBtn" class="big-btn good" type="button">Conferma comanda</button>
            <div class="compact-actions">
              <button id="paidBtn" class="big-btn warn" type="button">Pagato / chiudi</button>
              <button id="deleteOrderBtn" class="big-btn danger" type="button">Cancella</button>
            </div>
          </div>
        </div>
      </aside>

      <section class="panel history-panel" aria-label="Storico ordini">
        <div class="panel-head">
          <h2 class="panel-title">Storico e tavoli</h2>
          <button id="clearClosedBtn" class="small-btn" type="button">Pulisci chiusi</button>
        </div>
        <div class="panel-body">
          <h3 class="recent-title">Tavoli aperti</h3>
          <div id="openOrders" class="open-orders"></div>
          <h3 class="recent-title" style="margin-top: 16px;">Storico</h3>
          <div id="historyList" class="history-list"></div>
        </div>
      </section>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Navigazione mobile">
    <button id="navMenu" class="active" type="button">🍽️ Menù</button>
    <button id="navCart" type="button">🧾 Comanda</button>
    <button id="navHistory" type="button">📜 Storico</button>
  </nav>

  <div id="modifierDrawer" class="drawer" role="dialog" aria-modal="true" aria-labelledby="modifierTitle">
    <div class="sheet">
      <div class="sheet-head">
        <div>
          <h2 id="modifierTitle" class="sheet-title">Prodotto</h2>
          <div id="modifierPrice" class="history-meta"></div>
        </div>
        <button id="closeModifierBtn" class="close-btn" type="button">✕</button>
      </div>
      <div id="modifierGroups"></div>
      <div class="option-group">
        <p class="option-title">Note cucina <small>facoltativo</small></p>
        <textarea id="modifierNote" class="note-area" placeholder="Es. senza cipolla, ben cotto, salsa a parte..."></textarea>
      </div>
      <button id="addModifiedBtn" class="big-btn good" type="button">Aggiungi</button>
    </div>
  </div>

  <div id="comandaDrawer" class="drawer" role="dialog" aria-modal="true">
    <div class="sheet">
      <div class="sheet-head">
        <h2 class="sheet-title">Vista comanda</h2>
        <button id="closeComandaBtn" class="close-btn" type="button">✕</button>
      </div>
      <div id="comandaText" class="confirm-view"></div>
      <div class="big-actions">
        <button id="copyComandaBtn" class="big-btn blue" type="button">Copia testo</button>
        <button id="closeComanda2Btn" class="big-btn secondary" type="button">Torna</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Salvato</div>

  <script>
    const CATEGORIES = [
      'Daily Brunch','American Breakfast','Specialities','Salad','Club & Sandwich','Hot Dog','Bagel & Wrap','NY Burger','Kids Menu','Pancake & Waffle','Sweet & Co.','Cakes & Pies','Yogurt','Milkshake & Smoothies','Iced Cappuccino / Choco','Caffetteria, tè e fresh drinks','Sodas / Acqua / Succhi','Sides','Alcolico'
    ];

    const COMMON = {
      drinkIncluded: {
        id: 'drinkIncluded', title: 'Bevanda inclusa', required: true, multiple: false,
        options: [
          { name: "Succo d'arancia", price: 0 },
          { name: 'Caffè americano', price: 0 }
        ]
      },
      eggs: {
        id: 'eggs', title: 'Uova', required: false, multiple: false,
        options: [
          { name: 'Strapazzate', price: 0 },
          { name: "All'occhio di bue", price: 0 }
        ]
      },
      kidsDrink: {
        id: 'kidsDrink', title: 'Bevanda Kids Menu', required: true, multiple: false,
        options: [
          { name: 'Acqua', price: 0 },
          { name: 'Succo di frutta', price: 0 },
          { name: 'Coca-Cola in lattina', price: 1 }
        ]
      },
      pancakeExtras: {
        id: 'pancakeExtras', title: 'Extra colazione', required: false, multiple: true,
        options: [
          { name: "Succo d'arancia", price: 1.5 },
          { name: 'Iced cappuccino/choco', price: 2 }
        ]
      },
      coconutMilk: {
        id: 'coconutMilk', title: 'Extra', required: false, multiple: true,
        options: [ { name: 'Latte di cocco', price: 1 } ]
      },
      burgerBeer: {
        id: 'burgerBeer', title: 'Abbinamento', required: false, multiple: true,
        options: [ { name: 'Budweiser alla spina 0,25', price: 3.5 } ]
      },
      veggieExtras: {
        id: 'veggieExtras', title: 'Extra Veggie', required: false, multiple: true,
        options: [
          { name: 'French fries', price: 1.5 },
          { name: 'Onion rings', price: 1.5 }
        ]
      },
      yogurtGreek: {

    function nowIso() { return new Date().toISOString(); }
    function safeParse(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }
    function clone(value) { return JSON.parse(JSON.stringify(value)); }

      historyTopBtn: document.getElementById('historyTopBtn'), clearClosedBtn: document.getElementById('clearClosedBtn'), openOrders: document.getElementById('openOrders'), historyList: document.getElementById('historyList'),
      modifierDrawer: document.getElementById('modifierDrawer'), modifierTitle: document.getElementById('modifierTitle'), modifierPrice: document.getElementById('modifierPrice'), modifierGroups: document.getElementById('modifierGroups'), modifierNote: document.getElementById('modifierNote'), addModifiedBtn: document.getElementById('addModifiedBtn'), closeModifierBtn: document.getElementById('closeModifierBtn'),
      comandaDrawer: document.getElementById('comandaDrawer'), comandaText: document.getElementById('comandaText'), closeComandaBtn: document.getElementById('closeComandaBtn'), closeComanda2Btn: document.getElementById('closeComanda2Btn'), copyComandaBtn: document.getElementById('copyComandaBtn'),

      selectedCategory: CATEGORIES[0],

    function boot() {
      renderCategories(); renderProducts(); renderRecents(); renderOrder(); renderHistory(); wireEvents();

    function wireEvents() {
      els.searchInput.addEventListener('input', renderProducts);
      els.tableInput.addEventListener('input', () => { state.table = els.tableInput.value.trim(); touchCurrentOrder(); renderOrder(); });

      els.showComandaBtn.addEventListener('click', showComanda);
      els.confirmBtn.addEventListener('click', confirmOrder);
      els.paidBtn.addEventListener('click', closeOrder);

    function setMobileView(view) {
      document.body.classList.toggle('mobile-cart', view === 'cart');
      document.body.classList.toggle('mobile-history', view === 'history');
      els.navMenu.classList.toggle('active', view === 'menu');
      els.navCart.classList.toggle('active', view === 'cart');
      els.navHistory.classList.toggle('active', view === 'history');
      if (view === 'cart') renderOrder();
      if (view === 'history') renderHistory();
    }

    function renderCategories() {
      els.categoryScroll.innerHTML = '';
      CATEGORIES.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn' + (state.selectedCategory === cat ? ' active' : '');
        btn.type = 'button'; btn.textContent = iconFor(cat) + ' ' + shortCat(cat);
        btn.addEventListener('click', () => { state.selectedCategory = cat; els.searchInput.value = ''; renderCategories(); renderProducts(); });
        els.categoryScroll.appendChild(btn);
      });
    }

    function renderProducts() {
      const q = normalize(els.searchInput.value);
      const list = MENU.filter(p => q ? normalize(p.name + ' ' + p.description + ' ' + p.category).includes(q) : p.category === state.selectedCategory);
      els.productGrid.innerHTML = '';
      list.forEach(p => els.productGrid.appendChild(productButton(p)));
      els.noResults.classList.toggle('hidden', list.length > 0);
    }

    function productButton(product) {
      const btn = document.createElement('button');
      btn.className = 'product'; btn.type = 'button';
      btn.innerHTML = `
        <div>
          <div class="product-name">${escapeHtml(product.name)}</div>
          <p class="desc">${escapeHtml(product.description || '')}</p>
        </div>
        <div class="product-meta"><span class="price">${eur(product.price)}</span>${product.modifiers?.length ? '<span class="tag">opzioni</span>' : ''}</div>
      `;
      btn.addEventListener('click', () => addProduct(product));
      return btn;
    }

    function renderRecents() {
      const recents = state.recent.map(id => MENU.find(p => p.id === id)).filter(Boolean).slice(0, 10);
      els.recentStrip.classList.toggle('show', recents.length > 0);
      els.recentList.innerHTML = '';
      recents.forEach(p => {
        const b = document.createElement('button'); b.className = 'recent-btn'; b.type = 'button'; b.textContent = p.name;
        b.addEventListener('click', () => addProduct(p));
        els.recentList.appendChild(b);
      });
    }

    function addProduct(product) {
      ensureTableSoft();
      if (product.modifiers && product.modifiers.length) return openModifier(product);
      addLine(product, [], '');
    }

    function openModifier(product, existingLine = null) {
      state.modifierProduct = product;
      state.editLineId = existingLine?.lineId || null;
      state.modifierSelection = {};
      els.modifierTitle.textContent = product.name;
      els.modifierPrice.textContent = `Prezzo base: ${eur(product.price)}`;
      els.modifierNote.value = existingLine?.note || '';
      els.modifierGroups.innerHTML = '';
      product.modifiers.forEach(group => {
        const box = document.createElement('div'); box.className = 'option-group';
        box.innerHTML = `<p class="option-title">${escapeHtml(group.title)} ${group.required ? '<small>obbligatorio</small>' : '<small>facoltativo</small>'}</p>`;
        const optList = document.createElement('div'); optList.className = 'option-list';
        const selectedFromLine = existingLine?.modifiers?.filter(m => m.groupId === group.id).map(m => m.name) || [];
        group.options.forEach(opt => {
          const chip = document.createElement('button'); chip.className = 'option-chip'; chip.type = 'button';
          const selected = selectedFromLine.includes(opt.name);
          if (selected) chip.classList.add('selected');
          if (selected) {
            if (!state.modifierSelection[group.id]) state.modifierSelection[group.id] = [];
            state.modifierSelection[group.id].push(opt);
          }
          chip.innerHTML = `<span>${escapeHtml(opt.name)}</span>${opt.price ? `<div class="option-price">+ ${eur(opt.price)}</div>` : ''}`;
          chip.addEventListener('click', () => toggleOption(group, opt, chip, optList));
          optList.appendChild(chip);
        });
        box.appendChild(optList); els.modifierGroups.appendChild(box);
      });
      els.addModifiedBtn.textContent = state.editLineId ? 'Salva modifica' : 'Aggiungi';
      els.modifierDrawer.classList.add('show');
    }

    function toggleOption(group, opt, chip, optList) {
      if (!state.modifierSelection[group.id]) state.modifierSelection[group.id] = [];
      if (group.multiple) {
        const exists = state.modifierSelection[group.id].some(o => o.name === opt.name);
        if (exists) {
          state.modifierSelection[group.id] = state.modifierSelection[group.id].filter(o => o.name !== opt.name);
          chip.classList.remove('selected');
        } else {
          state.modifierSelection[group.id].push(opt);
          chip.classList.add('selected');
        }
      } else {
        const was = chip.classList.contains('selected');
        optList.querySelectorAll('.option-chip').forEach(c => c.classList.remove('selected'));
        state.modifierSelection[group.id] = [];
        if (!was) { state.modifierSelection[group.id] = [opt]; chip.classList.add('selected'); }
      }
    }

    function addModifiedItem() {
      const product = state.modifierProduct;
      if (!product) return;
      for (const group of product.modifiers) {
        if (group.required && !(state.modifierSelection[group.id] || []).length) {
          toast(`Scegli: ${group.title}`); return;
        }
      }
      const mods = [];
      product.modifiers.forEach(group => {
        (state.modifierSelection[group.id] || []).forEach(opt => mods.push({ groupId: group.id, groupTitle: group.title, name: opt.name, price: opt.price || 0 }));
      });
      if (state.editLineId) {
        const line = state.items.find(x => x.lineId === state.editLineId);
        if (line) {
          line.modifiers = mods; line.note = els.modifierNote.value.trim(); line.unitPrice = calcUnit(product, mods); line.signature = makeSignature(product, mods, line.note);
          markModifiedIfNeeded(); saveCurrentOrder(); renderOrder(); renderHistory(); toast('Modifica salvata');
        }
      } else {
        addLine(product, mods, els.modifierNote.value.trim());
      }
      closeModifier();
    }

    function closeModifier() { els.modifierDrawer.classList.remove('show'); state.modifierProduct = null; state.editLineId = null; state.modifierSelection = {}; }

    function addLine(product, modifiers = [], note = '') {
      ensureTableSoft();
      const signature = makeSignature(product, modifiers, note);
      const existing = state.items.find(x => x.signature === signature);
      if (existing) existing.qty += 1;
      else state.items.push({ lineId: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()), productId: product.id, name: product.name, basePrice: product.price, unitPrice: calcUnit(product, modifiers), qty: 1, modifiers, note, signature });
      pushRecent(product.id); markModifiedIfNeeded(); saveCurrentOrder(); renderOrder(); renderHistory(); renderRecents(); toast(`${product.name} aggiunto`);
    }

    function calcUnit(product, modifiers) { return (product.price || 0) + modifiers.reduce((s, m) => s + (m.price || 0), 0); }
    function makeSignature(product, modifiers, note) { return product.id + '|' + modifiers.map(m => `${m.groupId}:${m.name}:${m.price}`).sort().join(',') + '|' + (note || '').trim().toLowerCase(); }
    function pushRecent(productId) { state.recent = [productId, ...state.recent.filter(id => id !== productId)].slice(0, 12); localStorage.setItem('wo_recent', JSON.stringify(state.recent)); }

    function renderOrder() {
      els.orderTitle.textContent = state.table ? `Tavolo ${state.table}` : 'Comanda';
      els.currentStatus.className = 'status-pill ' + statusClass(state.status);
      els.currentStatus.textContent = statusLabel(state.status);
      const count = state.items.reduce((s, x) => s + x.qty, 0);
      els.cartCount.textContent = `${count} articoli`;
      els.orderList.innerHTML = '';
      state.items.forEach(line => els.orderList.appendChild(orderRow(line)));
      els.emptyOrder.classList.toggle('hidden', state.items.length > 0);
      els.orderTotal.classList.toggle('hidden', state.items.length === 0);
      els.totalValue.textContent = eur(total());
      els.confirmBtn.textContent = state.status === 'confirmed' ? 'Già confermato' : state.status === 'modified' ? 'Aggiorna comanda' : 'Conferma comanda';
      els.confirmBtn.disabled = state.status === 'confirmed' && state.items.length > 0;
      els.confirmBtn.style.opacity = els.confirmBtn.disabled ? '.55' : '1';
    }

    function orderRow(line) {
      const row = document.createElement('div'); row.className = 'order-row';
      row.innerHTML = `
        <div class="row-main">
          <div>
            <div class="row-title">${line.qty}× ${escapeHtml(line.name)}</div>
            ${lineDetails(line) ? `<div class="row-sub">${escapeHtml(lineDetails(line))}</div>` : ''}
          </div>
          <div class="row-price">${eur(line.unitPrice * line.qty)}</div>
        </div>
        <div class="row-actions">
          <button type="button" data-act="minus">−</button>
          <button type="button" data-act="plus">+</button>
          <button class="edit" type="button" data-act="edit">Modifica</button>
          <button class="danger" type="button" data-act="delete">×</button>
        </div>
      `;
      row.querySelector('[data-act="minus"]').addEventListener('click', () => changeQty(line.lineId, -1));
      row.querySelector('[data-act="plus"]').addEventListener('click', () => changeQty(line.lineId, 1));
      row.querySelector('[data-act="delete"]').addEventListener('click', () => removeLine(line.lineId));
      row.querySelector('[data-act="edit"]').addEventListener('click', () => editLine(line));
      return row;
    }

    function lineDetails(line) {
      const grouped = [];
      line.modifiers?.forEach(m => grouped.push(`${m.groupTitle}: ${m.name}${m.price ? ` (+${eur(m.price)})` : ''}`));
      if (line.note) grouped.push(`Nota: ${line.note}`);
      return grouped.join('\n');
    }

    function changeQty(lineId, delta) {
      const line = state.items.find(x => x.lineId === lineId);
      if (!line) return;
      line.qty += delta;
      if (line.qty <= 0) state.items = state.items.filter(x => x.lineId !== lineId);
      markModifiedIfNeeded(); saveCurrentOrder(); renderOrder(); renderHistory();
    }
    function removeLine(lineId) { state.items = state.items.filter(x => x.lineId !== lineId); markModifiedIfNeeded(); saveCurrentOrder(); renderOrder(); renderHistory(); }
    function editLine(line) { const product = MENU.find(p => p.id === line.productId); if (product?.modifiers?.length) openModifier(product, line); else openQuickNote(line); }

    function openQuickNote(line) {
      const note = prompt('Nota cucina per ' + line.name, line.note || '');
      if (note === null) return;
      line.note = note.trim();
      const product = MENU.find(p => p.id === line.productId);
      line.signature = makeSignature(product || line, line.modifiers || [], line.note);
      markModifiedIfNeeded(); saveCurrentOrder(); renderOrder(); renderHistory();
    }

    function total() { return state.items.reduce((s, x) => s + x.unitPrice * x.qty, 0); }

    function ensureTableSoft() { if (!state.table && els.tableInput.value.trim()) state.table = els.tableInput.value.trim(); }
    function touchCurrentOrder() { if (!state.orderId && (state.table || state.items.length)) state.orderId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()); saveCurrentOrder(false); }
    function saveCurrentOrder(show = false) {
      if (!state.orderId && !state.table && state.items.length === 0) return;
      if (!state.orderId) state.orderId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
      const order = toOrder();
      const idx = state.history.findIndex(o => o.id === state.orderId);
      if (idx >= 0) state.history[idx] = { ...state.history[idx], ...order, updatedAt: nowIso() };
      else state.history.unshift(order);
      persist(); if (show) toast('Salvato');
    }

    function toOrder() { return { id: state.orderId, table: state.table, status: state.status, items: clone(state.items), total: total(), createdAt: state.history.find(o => o.id === state.orderId)?.createdAt || nowIso(), updatedAt: nowIso() }; }
    function persist() { localStorage.setItem('wo_history', JSON.stringify(state.history)); }
    function loadOrder(order) { state.orderId = order.id; state.table = order.table || ''; state.status = order.status || 'draft'; state.items = clone(order.items || []); els.tableInput.value = state.table; setMobileView('cart'); renderOrder(); renderHistory(); toast(`Tavolo ${state.table || '?'} aperto`); }

    function markModifiedIfNeeded() { if (state.status === 'confirmed') state.status = 'modified'; }

    function confirmOrder() {
      if (!state.table) { toast('Inserisci il tavolo'); els.tableInput.focus(); return; }
      if (!state.items.length) { toast('Ordine vuoto'); return; }
      state.status = 'confirmed'; saveCurrentOrder(true); renderOrder(); renderHistory(); showComanda();
    }

    function closeOrder() {
      if (!state.orderId || !state.items.length) { toast('Nessun ordine da chiudere'); return; }
      if (!confirm('Segnare il tavolo come pagato e chiuso?')) return;
      state.status = 'closed'; saveCurrentOrder(true); renderHistory(); newOrder(false); setMobileView('menu');
    }

    function deleteCurrentOrder() {
      if (!state.orderId && !state.items.length) return newOrder(false);
      if (!confirm('Cancellare questo ordine?')) return;
      if (state.orderId) state.history = state.history.filter(o => o.id !== state.orderId);
      persist(); newOrder(false); renderHistory(); toast('Ordine cancellato');
    }

    function newOrder(ask = true) {
      if (ask && state.items.length && state.status !== 'closed' && !confirm('Creare una nuova comanda? Quella attuale resta nello storico se salvata.')) return;
      state.orderId = null; state.table = ''; state.status = 'draft'; state.items = []; els.tableInput.value = ''; els.searchInput.value = ''; setMobileView('menu'); renderOrder(); renderProducts();
      setTimeout(() => els.tableInput.focus(), 100);
    }

    function renderHistory() {
      const open = state.history.filter(o => o.status !== 'closed');
      const closed = state.history.filter(o => o.status === 'closed');
      els.openOrders.innerHTML = open.length ? '' : '<div class="empty">Nessun tavolo aperto.</div>';
      open.forEach(o => els.openOrders.appendChild(historyCard(o, true)));
      els.historyList.innerHTML = closed.length ? '' : '<div class="empty">Nessun ordine chiuso.</div>';
      closed.forEach(o => els.historyList.appendChild(historyCard(o, false)));
    }

    function historyCard(order, isOpen) {
      const card = document.createElement('div'); card.className = 'history-card';
      const itemCount = (order.items || []).reduce((s, x) => s + x.qty, 0);
      card.innerHTML = `
        <div class="history-top">
          <div>
            <div class="history-title">Tavolo ${escapeHtml(order.table || '?')}</div>
            <div class="history-meta">${formatDate(order.updatedAt || order.createdAt)} · ${itemCount} articoli · ${eur(order.total || 0)}</div>
          </div>
          <span class="status-pill ${statusClass(order.status)}">${statusLabel(order.status)}</span>
        </div>
        <div class="row-sub">${escapeHtml(summary(order))}</div>
        <div class="history-actions">
          <button class="blue" type="button" data-act="open">Apri</button>
          <button type="button" data-act="view">Comanda</button>
          <button class="danger" type="button" data-act="delete">Elimina</button>
        </div>
      `;
      card.querySelector('[data-act="open"]').addEventListener('click', () => loadOrder(order));
      card.querySelector('[data-act="view"]').addEventListener('click', () => { const current = toOrderSafely(); state.orderId = order.id; state.table = order.table; state.status = order.status; state.items = clone(order.items || []); showComanda(); if (current) restoreOrder(current); renderOrder(); });
      card.querySelector('[data-act="delete"]').addEventListener('click', () => deleteHistoryOrder(order.id));
      return card;
    }

    function toOrderSafely() { return { orderId: state.orderId, table: state.table, status: state.status, items: clone(state.items) }; }
    function restoreOrder(s) { state.orderId = s.orderId; state.table = s.table; state.status = s.status; state.items = s.items; els.tableInput.value = state.table || ''; }
    function summary(order) { return (order.items || []).slice(0, 5).map(x => `${x.qty}× ${x.name}`).join('\n') + ((order.items || []).length > 5 ? '\n…' : ''); }
    function deleteHistoryOrder(id) { if (!confirm('Eliminare definitivamente questo ordine?')) return; state.history = state.history.filter(o => o.id !== id); if (state.orderId === id) newOrder(false); persist(); renderHistory(); toast('Eliminato'); }
    function clearClosedOrders() { if (!confirm('Eliminare tutti gli ordini chiusi?')) return; state.history = state.history.filter(o => o.status !== 'closed'); persist(); renderHistory(); toast('Storico chiusi pulito'); }

    function showComanda() {
      if (!state.items.length) { toast('Ordine vuoto'); return; }
      els.comandaText.textContent = buildComandaText();
      els.comandaDrawer.classList.add('show');
    }
    function closeComanda() { els.comandaDrawer.classList.remove('show'); }
    async function copyComanda() {
      const text = buildComandaText();
      try { await navigator.clipboard.writeText(text); toast('Comanda copiata'); }
      catch { toast('Copia non disponibile'); }
    }
    function buildComandaText() {
      const lines = [];
      lines.push('====================');
      lines.push(`TAVOLO ${state.table || '?'}`);
      lines.push(statusLabel(state.status).replace(/^[^ ]+ /, '').toUpperCase());
      lines.push('====================');
      state.items.forEach(line => {
        lines.push(`${line.qty}x ${line.name}`);
        (line.modifiers || []).forEach(m => lines.push(`  - ${m.groupTitle}: ${m.name}${m.price ? ` (+${eur(m.price)})` : ''}`));
        if (line.note) lines.push(`  NOTA: ${line.note}`);
      });
      lines.push('--------------------');
      lines.push(`Totale: ${eur(total())}`);
      return lines.join('\n');
    }

    function normalize(s) { return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
    function iconFor(cat) { if (cat.includes('Burger')) return '🍔'; if (cat.includes('Sodas') || cat.includes('Caffetteria') || cat.includes('Milkshake') || cat.includes('Iced')) return '🥤'; if (cat.includes('Pancake')) return '🥞'; if (cat.includes('Sweet') || cat.includes('Cakes') || cat.includes('Yogurt')) return '🍰'; if (cat.includes('Salad')) return '🥗'; if (cat.includes('Sides')) return '🍟'; if (cat.includes('Breakfast') || cat.includes('Brunch')) return '🍳'; if (cat.includes('Sandwich') || cat.includes('Bagel') || cat.includes('Hot Dog')) return '🥪'; if (cat.includes('Alcolico')) return '🍺'; return '🍽️'; }
    function shortCat(cat) { return cat.replace('Caffetteria, tè e fresh drinks','Caffetteria').replace('Sodas / Acqua / Succhi','Sodas').replace('Milkshake & Smoothies','Milkshake').replace('Iced Cappuccino / Choco','Iced').replace('Pancake & Waffle','Pancake').replace('Cakes & Pies','Cakes'); }
    function statusClass(status) { return status === 'confirmed' ? 'status-confirmed' : status === 'modified' ? 'status-modified' : status === 'closed' ? 'status-closed' : 'status-draft'; }
    function statusLabel(status) { return status === 'confirmed' ? '🟢 Confermato' : status === 'modified' ? '🟠 Modificato' : status === 'closed' ? '⚫ Chiuso' : '🟡 In presa'; }
    function formatDate(iso) { if (!iso) return ''; const d = new Date(iso); return d.toLocaleString('it-IT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }); }
    function escapeHtml(str) { return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
    let toastTimer; function toast(msg) { els.toast.textContent = msg; els.toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => els.toast.classList.remove('show'), 1600); }
  </script>
</body>
</html>
