<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c6426e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Comande" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <title>Comande White Bakery</title>
  <style>
    :root {
      --bg: #fff7fb;
      --paper: #ffffff;
      --paper-2: #fff0f5;
      --ink: #241b25;
      --muted: #73636f;
      --line: #ead3dd;
      --brand: #c6426e;
      --brand-dark: #9c2b50;
      --brand-2: #f7d8e4;
      --good: #0b8754;
      --warn: #d77904;
      --danger: #c3212d;
      --blue: #2765c7;
      --shadow: 0 10px 26px rgba(91, 37, 58, .10);
      --radius: 18px;
      --tap: 48px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body { overscroll-behavior-y: none; }
    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; touch-action: manipulation; }

    .app-shell {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      min-height: 100dvh;
      padding: calc(8px + var(--safe-top)) 8px calc(78px + var(--safe-bottom));
      display: block;
    }

    .topbar {
      position: sticky;
      top: max(6px, var(--safe-top));
      z-index: 50;
      display: grid;
      grid-template-columns: minmax(78px, 1fr) minmax(84px, 1fr) auto;
      grid-template-areas:
        "table people actions"
        "search search search";
      gap: 8px;
      width: 100%;
      padding: 9px;
      background: rgba(255, 247, 251, .96);
      backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }
    .table-input { grid-area: table; }
    .people-input { grid-area: people; }
    .search { grid-area: search; }
    .top-actions { grid-area: actions; justify-self: end; display: flex; gap: 7px; align-items: center; min-width: 0; }
    .table-input, .people-input, .search {
      width: 100%;
      height: var(--tap);
      min-width: 0;
      border: 2px solid var(--brand-2);
      border-radius: 16px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      font-size: 16px;
      font-weight: 850;
      outline: none;
    }
    .table-input:focus, .people-input:focus, .search:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(198,66,110,.10); }
    .search { font-weight: 780; }
    .icon-btn, .small-btn {
      min-height: var(--tap);
      border-radius: 16px;
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--line);
      font-weight: 950;
      padding: 0 12px;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(91, 37, 58, .07);
    }
    .top-actions .icon-btn { width: 46px; padding: 0; }
    .icon-btn.primary, .small-btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }

    .layout { display: block; margin-top: 10px; }
    .panel {
      width: 100%;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel + .panel { margin-top: 10px; }
    .panel-head {
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .panel-title { margin: 0; font-size: 17px; font-weight: 950; letter-spacing: -.02em; }
    .panel-body { padding: 10px; }

    .status-pill { display: inline-flex; gap: 5px; align-items: center; padding: 5px 9px; border-radius: 999px; font-weight: 950; font-size: 12px; white-space: nowrap; }
    .status-draft { background: #fff0cd; color: #785000; }
    .status-confirmed { background: #e8fff3; color: #00683a; }
    .status-modified { background: #ffe7cc; color: #8a4200; }
    .status-closed { background: #e8ecf5; color: #384051; }

    .category-scroll {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 10px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid rgba(234,211,221,.65);
      background: linear-gradient(180deg, #fff, #fffafb);
    }
    .category-scroll::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex: 0 0 auto;
      min-height: 42px;
      border-radius: 999px;
      padding: 0 13px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 13px;
      font-weight: 950;
      color: var(--ink);
      box-shadow: 0 2px 8px rgba(91,37,58,.05);
    }
    .cat-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }

    .recent-strip { padding: 0 10px 10px; display: none; background: #fff; }
    .recent-strip.show { display: block; }
    .recent-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 2px 0 8px; }
    .recent-title { font-size: 11px; font-weight: 950; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .clear-recent-btn { min-height: 30px; border-radius: 999px; padding: 0 10px; background: #fff; color: var(--danger); border: 1px solid #ffd0d6; font-size: 11px; font-weight: 950; }
    .history-head-actions { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; justify-content: flex-end; }
    .recent-list { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
    .recent-list::-webkit-scrollbar { display: none; }
    .recent-chip { flex: 0 0 auto; display: inline-flex; align-items: stretch; border-radius: 999px; overflow: hidden; border: 1px solid #f2d99b; background: #fff4dc; }
    .recent-btn { min-height: 40px; background: transparent; color: #5a3900; font-size: 13px; font-weight: 950; padding: 0 10px 0 12px; }
    .recent-remove { width: 34px; min-height: 40px; background: #ffe8eb; color: var(--danger); border-left: 1px solid #f2d99b; font-size: 16px; font-weight: 950; }

    .product-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .product {
      width: 100%;
      min-height: 62px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      text-align: left;
      border-radius: 16px;
      padding: 11px 12px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--ink);
      box-shadow: 0 2px 9px rgba(91,37,58,.055);
    }
    .product:active { transform: scale(.988); background: #fff6fa; }
    .product-name { font-size: 15px; font-weight: 950; line-height: 1.15; letter-spacing: -.01em; }
    .desc { display: none; }
    .product-meta { display: flex; justify-content: flex-end; align-items: center; gap: 6px; flex-wrap: wrap; }
    .price { font-size: 14px; font-weight: 950; color: var(--brand); white-space: nowrap; }
    .tag { font-size: 10px; font-weight: 950; padding: 4px 7px; border-radius: 999px; background: var(--brand-2); color: var(--brand-dark); white-space: nowrap; }
    .empty { color: var(--muted); font-weight: 850; text-align: center; padding: 24px 12px; }

    .order-panel, .history-panel { display: none; }
    body.mobile-cart .menu-panel, body.mobile-cart .history-panel { display: none; }
    body.mobile-cart .order-panel { display: block; }
    body.mobile-history .menu-panel, body.mobile-history .order-panel { display: none; }
    body.mobile-history .history-panel { display: block; }

    .order-list { display: grid; gap: 8px; }
    .order-row { border: 1px solid var(--line); border-radius: 16px; background: #fff; padding: 10px; display: grid; gap: 8px; }
    .order-row.auto-fee { background: #fffaf0; border-color: #f2d99b; }
    .auto-label { display: inline-flex; align-items: center; gap: 4px; border-radius: 999px; background: #fff4dc; color: #6c4700; font-size: 10px; font-weight: 950; padding: 3px 7px; margin-left: 6px; vertical-align: middle; }
    .manual-label { display: inline-flex; align-items: center; gap: 4px; border-radius: 999px; background: #eaf1ff; color: #27519b; font-size: 10px; font-weight: 950; padding: 3px 7px; margin-left: 6px; vertical-align: middle; }
    .fee-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .fee-chip { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 8px; font-size: 11px; font-weight: 850; line-height: 1; background: #fff; border: 1px solid var(--line); color: var(--muted); }
    .fee-chip.manual { background: #eaf1ff; color: #27519b; border-color: #cfe0ff; }
    .fee-chip.warn { background: #fff4dc; color: #6c4700; border-color: #f2d99b; }
    .fee-actions { grid-template-columns: 44px 44px 1fr; align-items: center; }
    .fee-actions .reset { background: #fff; color: var(--muted); border: 1px solid var(--line); }
    .fee-zero { opacity: .68; }
    .row-main { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; }
    .row-title { font-weight: 950; font-size: 15px; line-height: 1.15; }
    .row-sub { color: var(--muted); font-weight: 760; font-size: 12px; line-height: 1.35; margin-top: 3px; white-space: pre-wrap; }
    .row-price { font-weight: 950; color: var(--brand); white-space: nowrap; }
    .row-actions { display: grid; grid-template-columns: 44px 44px 1fr 44px; gap: 6px; }
    .row-actions button { min-height: 40px; border-radius: 12px; font-weight: 950; background: var(--paper-2); color: var(--ink); }
    .row-actions .danger { background: #ffe9ec; color: var(--danger); }
    .row-actions .edit { background: #eaf1ff; color: var(--blue); }
    .order-total { display: flex; align-items: center; justify-content: space-between; font-size: 18px; font-weight: 950; padding: 11px 12px; border-radius: 16px; background: var(--paper-2); margin-top: 10px; }
    .big-actions { display: grid; gap: 8px; margin-top: 10px; }
    .danger-zone { display: flex; justify-content: flex-end; padding-top: 6px; margin-top: 2px; border-top: 1px dashed var(--line); }
    .small-danger-btn { min-height: 34px; border-radius: 12px; padding: 0 12px; font-size: 12px; font-weight: 950; background: #fff; color: var(--danger); border: 1px solid #f3bdc6; }
    .big-btn { min-height: 48px; border-radius: 16px; font-size: 15px; font-weight: 950; background: var(--brand); color: #fff; }
    .big-btn.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
    .big-btn.good { background: var(--good); }
    .big-btn.warn { background: var(--warn); }
    .big-btn.danger { background: var(--danger); }
    .big-btn.blue { background: var(--blue); }
    .compact-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 80;
      padding: 8px 10px calc(8px + var(--safe-bottom));
      background: rgba(255, 247, 251, .94);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--line);
      display: flex;
      gap: 8px;
    }
    .bottom-nav button { flex: 1; min-height: 50px; border-radius: 16px; background: #fff; border: 1px solid var(--line); color: var(--ink); font-size: 12px; font-weight: 950; box-shadow: 0 4px 12px rgba(91,37,58,.08); }
    .bottom-nav button.active { background: var(--brand); color: #fff; border-color: var(--brand); }

    .drawer { position: fixed; inset: 0; z-index: 100; background: rgba(36, 27, 37, .45); display: none; align-items: flex-end; }
    .drawer.show { display: flex; }
    .sheet { width: 100%; max-height: 90dvh; overflow: auto; background: var(--bg); border-radius: 24px 24px 0 0; padding: 12px 10px calc(12px + var(--safe-bottom)); box-shadow: 0 -18px 55px rgba(0,0,0,.22); }
    .sheet-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
    .sheet-title { margin: 0; font-size: 21px; font-weight: 950; letter-spacing: -.03em; }
    #addModifiedBtn { display: block; margin: 12px 0 0 auto; min-width: 132px; padding-inline: 24px; }
    .close-btn { width: 44px; height: 44px; border-radius: 14px; background: #fff; border: 1px solid var(--line); font-weight: 950; }
    .option-group { background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 11px; margin: 10px 0; transition: background .18s ease, border-color .18s ease, box-shadow .18s ease; }
    .option-group.required-missing { background: #fff1f3; border-color: #e45c72; box-shadow: 0 0 0 3px rgba(228,92,114,.12); }
    .option-group.required-missing .option-title { color: #b21f3a; }
    .option-group.required-missing .option-title small::after { content: " · da scegliere"; color: #b21f3a; font-weight: 950; }
    .option-title { margin: 0 0 8px; font-size: 15px; font-weight: 950; }
    .option-title small { color: var(--muted); font-weight: 850; }
    .option-list { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .option-chip { min-height: 46px; border-radius: 14px; background: #fff; border: 2px solid var(--line); color: var(--ink); font-size: 14px; font-weight: 900; padding: 8px 10px; text-align: left; }
    .option-group.required-missing .option-chip { border-color: #efb6c1; }
    .option-chip.selected { border-color: var(--brand); background: var(--brand-2); color: var(--brand-dark); }
    .option-price { color: var(--muted); font-size: 12px; font-weight: 850; }
    .note-area { width: 100%; min-height: 84px; resize: vertical; border: 2px solid var(--line); border-radius: 16px; padding: 12px; background: #fff; color: var(--ink); font-weight: 760; }

    .history-list, .open-orders { display: grid; gap: 8px; }
    .history-card { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 11px; display: grid; gap: 8px; }
    .history-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .history-title { font-weight: 950; font-size: 15px; }
    .history-meta { color: var(--muted); font-size: 12px; font-weight: 800; }
    .history-actions { display: grid; grid-template-columns: 1fr; gap: 6px; }
    .history-actions button { min-height: 42px; border-radius: 14px; font-weight: 950; background: var(--paper-2); color: var(--ink); }
    .history-actions .danger { color: var(--danger); background: #ffe9ec; }
    .history-actions .blue { color: var(--blue); background: #eaf1ff; }

    .toast { position: fixed; z-index: 200; left: 50%; bottom: calc(74px + var(--safe-bottom)); transform: translateX(-50%) translateY(20px); opacity: 0; transition: .22s; pointer-events: none; background: #241b25; color: #fff; padding: 10px 14px; border-radius: 999px; font-weight: 950; box-shadow: 0 10px 25px rgba(0,0,0,.18); max-width: calc(100vw - 24px); text-align: center; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .confirm-view { background: #fff; border: 1px dashed var(--brand); border-radius: 16px; padding: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; white-space: pre-wrap; line-height: 1.35; font-weight: 800; }
    .hidden { display: none !important; }

    @media (min-width: 700px) {
      .app-shell { padding: calc(12px + var(--safe-top)) 12px 24px; }
      .topbar { grid-template-columns: 110px 110px 1fr auto; grid-template-areas: "table people search actions"; padding: 10px; }
      .layout { display: grid; grid-template-columns: 1fr 390px; gap: 12px; align-items: start; }
      .panel + .panel { margin-top: 0; }
      .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .product { min-height: 88px; display: flex; flex-direction: column; justify-content: space-between; align-items: stretch; }
      .desc { display: -webkit-box; margin: 0; color: var(--muted); font-size: 12px; line-height: 1.25; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .order-panel { display: block; position: sticky; top: 96px; }
      .history-panel { display: block; grid-column: 1 / -1; margin-top: 12px; }
      .bottom-nav { display: none; }
      .option-list { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .history-actions { grid-template-columns: 1fr 1fr 1fr; }
    }

    @media (min-width: 1030px) {
      .product-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 360px) {
      .topbar { grid-template-columns: 1fr 1fr; grid-template-areas: "table people" "search search" "actions actions"; }
      .top-actions { justify-self: stretch; }
      .top-actions .small-btn { flex: 1; }
      .top-actions .icon-btn { width: 48px; }
      .product { grid-template-columns: 1fr; }
      .product-meta { justify-content: flex-start; }
    }

  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar" aria-label="Barra principale">
      <input id="tableInput" class="table-input" type="text" inputmode="numeric" autocomplete="off" placeholder="Tavolo" aria-label="Numero tavolo" />
      <input id="peopleInput" class="people-input" type="number" inputmode="numeric" min="1" max="30" autocomplete="off" placeholder="Persone" aria-label="Numero persone" />
      <input id="searchInput" class="search" type="search" autocomplete="off" placeholder="Cerca nel menù..." aria-label="Cerca prodotto" />
      <div class="top-actions">
        <button id="newOrderBtn" class="small-btn primary" type="button">Nuovo</button>
        <button id="historyTopBtn" class="icon-btn" type="button" aria-label="Storico">📜</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel menu-panel" aria-label="Menù">
        <div class="panel-head">
          <h1 class="panel-title">Menù</h1>
          <span id="currentStatus" class="status-pill status-draft">🟡 In presa</span>
        </div>
        <div id="categoryScroll" class="category-scroll"></div>
        <div id="recentStrip" class="recent-strip">
          <div class="recent-head">
            <div class="recent-title">🕒 Recenti</div>
            <button id="clearRecentBtn" class="clear-recent-btn" type="button">Svuota</button>
          </div>
          <div id="recentList" class="recent-list"></div>
        </div>
        <div class="panel-body">
          <div id="productGrid" class="product-grid"></div>
          <div id="noResults" class="empty hidden">Nessun prodotto trovato.</div>
        </div>
      </section>

      <aside class="panel order-panel" aria-label="Comanda">
        <div class="panel-head">
          <h2 class="panel-title" id="orderTitle">Comanda</h2>
          <span id="cartCount" class="status-pill status-draft">0 articoli</span>
        </div>
        <div class="panel-body">
          <div id="orderList" class="order-list"></div>
          <div id="emptyOrder" class="empty">Inserisci tavolo/persone e tocca i prodotti. Coperto/servizio si aggiungono da soli.</div>
          <div id="orderTotal" class="order-total hidden"><span>Totale</span><span id="totalValue">€0,00</span></div>
          <div class="big-actions">
            <button id="showComandaBtn" class="big-btn blue" type="button">Vista comanda</button>
            <button id="confirmBtn" class="big-btn good" type="button">Conferma comanda</button>
            <div class="danger-zone">
              <button id="deleteOrderBtn" class="small-danger-btn" type="button">Cancella ordine</button>
            </div>
          </div>
        </div>
      </aside>

      <section class="panel history-panel" aria-label="Storico ordini">
        <div class="panel-head">
          <h2 class="panel-title">Storico comande</h2>
          <div class="history-head-actions">
            <span class="status-pill status-confirmed">Modificabile</span>
            <button id="clearHistoryBtn" class="clear-recent-btn" type="button">Svuota tutto</button>
          </div>
        </div>
        <div class="panel-body">
          <div id="historyList" class="history-list"></div>
        </div>
      </section>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Navigazione mobile">
    <button id="navMenu" class="active" type="button">🍽️ Menù</button>
    <button id="navCart" type="button">🧾 Comanda</button>
    <button id="navHistory" type="button">📜 Storico</button>
  </nav>

  <div id="modifierDrawer" class="drawer" role="dialog" aria-modal="true" aria-labelledby="modifierTitle">
    <div class="sheet">
      <div class="sheet-head">
        <div>
          <h2 id="modifierTitle" class="sheet-title">Prodotto</h2>
          <div id="modifierPrice" class="history-meta"></div>
        </div>
        <button id="closeModifierBtn" class="close-btn" type="button">✕</button>
      </div>
      <div id="modifierGroups"></div>
      <div class="option-group">
        <p class="option-title">Note cucina <small>facoltativo</small></p>
        <textarea id="modifierNote" class="note-area" placeholder="Es. senza cipolla, ben cotto, salsa a parte..."></textarea>
      </div>
      <button id="addModifiedBtn" class="big-btn good" type="button">Aggiungi</button>
    </div>
  </div>

  <div id="comandaDrawer" class="drawer" role="dialog" aria-modal="true">
    <div class="sheet">
      <div class="sheet-head">
        <h2 class="sheet-title">Vista comanda</h2>
        <button id="closeComandaBtn" class="close-btn" type="button">✕</button>
      </div>
      <div id="comandaText" class="confirm-view"></div>
      <div class="big-actions">
        <button id="copyComandaBtn" class="big-btn blue" type="button">Copia testo</button>
        <button id="closeComanda2Btn" class="big-btn secondary" type="button">Torna</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Salvato</div>

    function item(name, category, price, description = '', modifiers = []) {
      return { id: slug(category + '-' + name), name, category, price, description, modifiers, chargeType: classifyChargeType(name, category) };
    }
    function classifyChargeType(name, category) {
      const n = normalize(name);
      if (SERVICE_CATEGORIES.has(category) || /ruby|stay red|strawberr|crumble|banana split|pancake|waffle|cheesecake|cake|muffin|apple pie|sundae|milkshake|yogurt|granola|rice & nutella|angel|carrot|nutella cake|donut|cookie/.test(n)) return 'service';
      if (COVER_CATEGORIES.has(category) || /burger|dog|ribs|breakfast|sandwich|toast|salad|fries|rings|poutine|schnitzel|chicken|wrap|bagel|club|tamago|ruben/.test(n)) return 'cover';
      return 'neutral';
    }

    function slug(text) { return text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); }
    function eur(value) { return new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(value || 0); }
    function nowIso() { return new Date().toISOString(); }
    function safeParse(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }
    function clone(value) { return JSON.parse(JSON.stringify(value)); }

      showComandaBtn: document.getElementById('showComandaBtn'), confirmBtn: document.getElementById('confirmBtn'), deleteOrderBtn: document.getElementById('deleteOrderBtn'), newOrderBtn: document.getElementById('newOrderBtn'),
      historyTopBtn: document.getElementById('historyTopBtn'), historyList: document.getElementById('historyList'), clearHistoryBtn: document.getElementById('clearHistoryBtn'),
      modifierDrawer: document.getElementById('modifierDrawer'), modifierTitle: document.getElementById('modifierTitle'), modifierPrice: document.getElementById('modifierPrice'), modifierGroups: document.getElementById('modifierGroups'), modifierNote: document.getElementById('modifierNote'), addModifiedBtn: document.getElementById('addModifiedBtn'), closeModifierBtn: document.getElementById('closeModifierBtn'),
      comandaDrawer: document.getElementById('comandaDrawer'), comandaText: document.getElementById('comandaText'), closeComandaBtn: document.getElementById('closeComandaBtn'), closeComanda2Btn: document.getElementById('closeComanda2Btn'), copyComandaBtn: document.getElementById('copyComandaBtn'),
      navMenu: document.getElementById('navMenu'), navCart: document.getElementById('navCart'), navHistory: document.getElementById('navHistory'), toast: document.getElementById('toast')
    };

    const state = {
      selectedCategory: CATEGORIES[0],
      orderId: null,
      table: '',
      people: '',
      status: 'draft',
      items: [],
      feeAdjustments: { cover: 0, service: 0 },
      history: safeParse('wo_history', []),
      recent: safeParse('wo_recent', []),
      modifierProduct: null,
      editLineId: null,
      modifierSelection: {}
    };

    boot();

    function boot() {
      renderCategories(); renderProducts(); renderRecents(); renderOrder(); renderHistory(); wireEvents();
      if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {

    }

    function wireEvents() {
      els.searchInput.addEventListener('input', renderProducts);

      els.peopleInput.addEventListener('input', () => { state.people = normalizePeopleInput(els.peopleInput.value); touchCurrentOrder(); renderOrder(); renderHistory(); });
      els.newOrderBtn.addEventListener('click', newOrder);
      els.showComandaBtn.addEventListener('click', showComanda);
      els.confirmBtn.addEventListener('click', confirmOrder);
      els.deleteOrderBtn.addEventListener('click', deleteCurrentOrder);
      els.historyTopBtn.addEventListener('click', () => setMobileView('history'));
      els.clearHistoryBtn.addEventListener('click', clearHistory);
      els.clearRecentBtn.addEventListener('click', clearRecents);
      els.closeModifierBtn.addEventListener('click', closeModifier);
      els.addModifiedBtn.addEventListener('click', addModifiedItem);
      els.modifierDrawer.addEventListener('click', (e) => { if (e.target === els.modifierDrawer) closeModifier(); });
      els.closeComandaBtn.addEventListener('click', closeComanda);
      els.closeComanda2Btn.addEventListener('click', closeComanda);
      els.comandaDrawer.addEventListener('click', (e) => { if (e.target === els.comandaDrawer) closeComanda(); });
      els.copyComandaBtn.addEventListener('click', copyComanda);

    }

    function setMobileView(view) {
      document.body.classList.toggle('mobile-cart', view === 'cart');
      document.body.classList.toggle('mobile-history', view === 'history');
      els.navMenu.classList.toggle('active', view === 'menu');
      els.navCart.classList.toggle('active', view === 'cart');
      els.navHistory.classList.toggle('active', view === 'history');
      if (view === 'cart') renderOrder();
      if (view === 'history') renderHistory();
    }

    function renderCategories() {
      els.categoryScroll.innerHTML = '';
      CATEGORIES.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn' + (state.selectedCategory === cat ? ' active' : '');
        btn.type = 'button'; btn.textContent = iconFor(cat) + ' ' + shortCat(cat);
        btn.addEventListener('click', () => { state.selectedCategory = cat; els.searchInput.value = ''; renderCategories(); renderProducts(); });
        els.categoryScroll.appendChild(btn);
      });
    }

    function renderProducts() {
      const q = normalize(els.searchInput.value);
      const list = MENU.filter(p => q ? normalize(p.name + ' ' + p.description + ' ' + p.category).includes(q) : p.category === state.selectedCategory);
      els.productGrid.innerHTML = '';
      list.forEach(p => els.productGrid.appendChild(productButton(p)));
      els.noResults.classList.toggle('hidden', list.length > 0);
    }

    function productButton(product) {
      const btn = document.createElement('button');
      btn.className = 'product'; btn.type = 'button';
      btn.innerHTML = `
        <div>
          <div class="product-name">${escapeHtml(product.name)}</div>
          <p class="desc">${escapeHtml(product.description || '')}</p>
        </div>
        <div class="product-meta"><span class="price">${eur(product.price)}</span>${product.modifiers?.length ? '<span class="tag">opzioni</span>' : ''}</div>
      `;
      btn.addEventListener('click', () => addProduct(product));
      return btn;
    }

    function renderRecents() {
      const recents = state.recent.map(id => MENU.find(p => p.id === id)).filter(Boolean).slice(0, 10);
      els.recentStrip.classList.toggle('show', recents.length > 0);
      els.recentList.innerHTML = '';
      recents.forEach(p => {
        const chip = document.createElement('span');
        chip.className = 'recent-chip';

        const b = document.createElement('button');
        b.className = 'recent-btn';
        b.type = 'button';
        b.textContent = p.name;
        b.addEventListener('click', () => addProduct(p));

        const del = document.createElement('button');
        del.className = 'recent-remove';
        del.type = 'button';
        del.setAttribute('aria-label', `Elimina ${p.name} dai recenti`);
        del.textContent = '×';
        del.addEventListener('click', (event) => {
          event.stopPropagation();
          removeRecent(p.id);
        });

        chip.appendChild(b);
        chip.appendChild(del);
        els.recentList.appendChild(chip);
      });
    }

    function clearRecents() {
      if (!state.recent.length) return;
      if (!confirm('Svuotare tutti i prodotti recenti?')) return;
      state.recent = [];
      localStorage.removeItem('wo_recent');
      renderRecents();
      toast('Recenti svuotati');
    }

    function removeRecent(productId) {
      state.recent = state.recent.filter(id => id !== productId);
      localStorage.setItem('wo_recent', JSON.stringify(state.recent));
      renderRecents();
      toast('Rimosso dai recenti');
    }

    function addProduct(product) {
      ensureTableSoft();
      if (product.modifiers && product.modifiers.length) return openModifier(product);
      addLine(product, [], '');
    }

    function openModifier(product, existingLine = null) {
      state.modifierProduct = product;
      state.editLineId = existingLine?.lineId || null;
      state.modifierSelection = {};
      els.modifierTitle.textContent = product.name;
      els.modifierPrice.textContent = `Prezzo base: ${eur(product.price)}`;
      els.modifierNote.value = existingLine?.note || '';
      els.modifierGroups.innerHTML = '';
      product.modifiers.forEach(group => {
        const box = document.createElement('div');
        box.className = 'option-group';
        box.dataset.groupId = group.id;
        box.dataset.required = group.required ? '1' : '0';
        box.innerHTML = `<p class="option-title">${escapeHtml(group.title)} ${group.required ? '<small>obbligatorio</small>' : '<small>facoltativo</small>'}</p>`;
        const optList = document.createElement('div'); optList.className = 'option-list';
        const selectedFromLine = existingLine?.modifiers?.filter(m => m.groupId === group.id).map(m => m.name) || [];
        group.options.forEach(opt => {
          const chip = document.createElement('button'); chip.className = 'option-chip'; chip.type = 'button';
          const selected = selectedFromLine.includes(opt.name);
          if (selected) chip.classList.add('selected');
          if (selected) {
            if (!state.modifierSelection[group.id]) state.modifierSelection[group.id] = [];
            state.modifierSelection[group.id].push(opt);
          }
          chip.innerHTML = `<span>${escapeHtml(opt.name)}</span>${opt.price ? `<div class="option-price">+ ${eur(opt.price)}</div>` : ''}`;
          chip.addEventListener('click', () => toggleOption(group, opt, chip, optList));
          optList.appendChild(chip);
        });
        box.appendChild(optList); els.modifierGroups.appendChild(box);
      });
      els.addModifiedBtn.textContent = state.editLineId ? 'Salva modifica' : 'Aggiungi';
      els.modifierDrawer.classList.add('show');
    }

    function toggleOption(group, opt, chip, optList) {
      if (!state.modifierSelection[group.id]) state.modifierSelection[group.id] = [];
      if (group.multiple) {
        const exists = state.modifierSelection[group.id].some(o => o.name === opt.name);
        if (exists) {
          state.modifierSelection[group.id] = state.modifierSelection[group.id].filter(o => o.name !== opt.name);
          chip.classList.remove('selected');
        } else {
          state.modifierSelection[group.id].push(opt);
          chip.classList.add('selected');
        }
      } else {
        const was = chip.classList.contains('selected');
        optList.querySelectorAll('.option-chip').forEach(c => c.classList.remove('selected'));
        state.modifierSelection[group.id] = [];
        if (!was) { state.modifierSelection[group.id] = [opt]; chip.classList.add('selected'); }
      }
      updateRequiredHighlight(group.id, group.required && !(state.modifierSelection[group.id] || []).length);
    }

    function updateRequiredHighlight(groupId, isMissing) {
      const box = els.modifierGroups.querySelector(`[data-group-id="${CSS.escape(groupId)}"]`);
      if (!box) return;
      box.classList.toggle('required-missing', !!isMissing);
    }

    function highlightMissingRequiredGroups(product) {
      let firstMissing = null;
      product.modifiers.forEach(group => {
        const missing = group.required && !(state.modifierSelection[group.id] || []).length;
        updateRequiredHighlight(group.id, missing);
        if (missing && !firstMissing) {
          firstMissing = els.modifierGroups.querySelector(`[data-group-id="${CSS.escape(group.id)}"]`);
        }
      });
      if (firstMissing) {
        firstMissing.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      return !!firstMissing;
    }

    function addModifiedItem() {
      const product = state.modifierProduct;
      if (!product) return;
      if (highlightMissingRequiredGroups(product)) return;
      const mods = [];
      product.modifiers.forEach(group => {
        (state.modifierSelection[group.id] || []).forEach(opt => mods.push({ groupId: group.id, groupTitle: group.title, name: opt.name, price: opt.price || 0 }));
      });
      if (state.editLineId) {
        const line = state.items.find(x => x.lineId === state.editLineId);
        if (line) {
          line.modifiers = mods; line.note = els.modifierNote.value.trim(); line.unitPrice = calcUnit(product, mods); line.signature = makeSignature(product, mods, line.note);
          markModifiedIfNeeded(); saveCurrentOrder(); renderOrder(); renderHistory(); toast('Modifica salvata');
        }
      } else {
        addLine(product, mods, els.modifierNote.value.trim());
      }
      closeModifier();
    }

    function closeModifier() { els.modifierDrawer.classList.remove('show'); state.modifierProduct = null; state.editLineId = null; state.modifierSelection = {}; }

    function addLine(product, modifiers = [], note = '') {
      ensureTableSoft();
      const signature = makeSignature(product, modifiers, note);
      const existing = state.items.find(x => x.signature === signature);
      if (existing) existing.qty += 1;
      else state.items.push({ lineId: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()), productId: product.id, name: product.name, basePrice: product.price, unitPrice: calcUnit(product, modifiers), qty: 1, modifiers, note, signature, chargeType: product.chargeType });
      pushRecent(product.id); markModifiedIfNeeded(); saveCurrentOrder(); renderOrder(); renderHistory(); renderRecents(); toast(`${product.name} aggiunto`);
    }

    function calcUnit(product, modifiers) { return (product.price || 0) + modifiers.reduce((s, m) => s + (m.price || 0), 0); }
    function makeSignature(product, modifiers, note) { return product.id + '|' + modifiers.map(m => `${m.groupId}:${m.name}:${m.price}`).sort().join(',') + '|' + (note || '').trim().toLowerCase(); }
    function pushRecent(productId) { state.recent = [productId, ...state.recent.filter(id => id !== productId)].slice(0, 12); localStorage.setItem('wo_recent', JSON.stringify(state.recent)); }

    function renderOrder() {
      els.orderTitle.textContent = state.table ? `Tavolo ${state.table}` : 'Comanda';
      els.currentStatus.className = 'status-pill ' + statusClass(state.status);
      els.currentStatus.textContent = statusLabel(state.status);
      const count = state.items.reduce((s, x) => s + x.qty, 0);
      const fees = autoFees(false);
      const displayFees = state.items.length ? autoFees(true) : [];
      const feeCount = fees.reduce((s, x) => s + x.qty, 0);
      els.cartCount.textContent = feeCount ? `${count} prodotti + ${feeCount} cop/serv` : `${count} articoli`;
      els.orderList.innerHTML = '';
      state.items.forEach(line => els.orderList.appendChild(orderRow(line)));
      displayFees.forEach(fee => els.orderList.appendChild(autoFeeRow(fee)));
      els.emptyOrder.classList.toggle('hidden', state.items.length > 0);
      els.orderTotal.classList.toggle('hidden', state.items.length === 0);
      els.totalValue.textContent = eur(total());
      els.confirmBtn.textContent = state.status === 'confirmed' || state.status === 'modified' ? 'Salva nello storico' : 'Conferma comanda';
      els.confirmBtn.disabled = false;
      els.confirmBtn.style.opacity = '1';
    }

    function orderRow(line) {
      const row = document.createElement('div'); row.className = 'order-row';
      row.innerHTML = `
        <div class="row-main">
          <div>
            <div class="row-title">${line.qty}× ${escapeHtml(line.name)}</div>
            ${lineDetails(line) ? `<div class="row-sub">${escapeHtml(lineDetails(line))}</div>` : ''}
          </div>
          <div class="row-price">${eur(line.unitPrice * line.qty)}</div>
        </div>
        <div class="row-actions">
          <button type="button" data-act="minus">−</button>
          <button type="button" data-act="plus">+</button>
          <button class="edit" type="button" data-act="edit">Modifica</button>
          <button class="danger" type="button" data-act="delete">×</button>
        </div>
      `;
      row.querySelector('[data-act="minus"]').addEventListener('click', () => changeQty(line.lineId, -1));
      row.querySelector('[data-act="plus"]').addEventListener('click', () => changeQty(line.lineId, 1));
      row.querySelector('[data-act="delete"]').addEventListener('click', () => removeLine(line.lineId));
      row.querySelector('[data-act="edit"]').addEventListener('click', () => editLine(line));
      return row;
    }

    function autoFeeRow(fee) {
      const row = document.createElement('div');
      row.className = 'order-row auto-fee' + (fee.qty === 0 ? ' fee-zero' : '');
      const kindLabel = fee.type === 'cover' ? 'salati' : 'dolci';
      const manualChip = fee.adjustment !== 0
        ? `<span class="fee-chip manual">Correzione ${fee.adjustment > 0 ? '+' : ''}${fee.adjustment}</span>`
        : '';
      row.innerHTML = `
        <div class="row-main">
          <div>
            <div class="row-title">${fee.qty}x ${escapeHtml(fee.name)} <span class="auto-label">AUTO</span></div>
            <div class="fee-meta">
              <span class="fee-chip warn">Base ${fee.autoQty}</span>
              ${manualChip}
              <span class="fee-chip">${escapeHtml(fee.reason)}</span>
            </div>
          </div>
          <div class="row-price">${eur(fee.price * fee.qty)}</div>
        </div>
        <div class="row-actions fee-actions">
          <button type="button" data-act="minus">−</button>
          <button type="button" data-act="plus">+</button>
          <button class="reset" type="button" data-act="reset">Reset</button>
        </div>
      `;
      row.querySelector('[data-act="minus"]').addEventListener('click', () => adjustFee(fee.type, -1));
      row.querySelector('[data-act="plus"]').addEventListener('click', () => adjustFee(fee.type, 1));
      row.querySelector('[data-act="reset"]').addEventListener('click', () => resetFee(fee.type));
      return row;
    }

    function lineDetails(line) {
      const grouped = [];
      line.modifiers?.forEach(m => grouped.push(`${m.groupTitle}: ${m.name}${m.price ? ` (+${eur(m.price)})` : ''}`));
      if (line.note) grouped.push(`Nota: ${line.note}`);
      return grouped.join('\n');
    }

    function changeQty(lineId, delta) {
      const line = state.items.find(x => x.lineId === lineId);
      if (!line) return;
      line.qty += delta;
      if (line.qty <= 0) state.items = state.items.filter(x => x.lineId !== lineId);
      if (!state.items.length) state.feeAdjustments = { cover: 0, service: 0 };
      markModifiedIfNeeded(); saveCurrentOrder(); renderOrder(); renderHistory();
    }
    function removeLine(lineId) { state.items = state.items.filter(x => x.lineId !== lineId); if (!state.items.length) state.feeAdjustments = { cover: 0, service: 0 }; markModifiedIfNeeded(); saveCurrentOrder(); renderOrder(); renderHistory(); }
    function editLine(line) { const product = MENU.find(p => p.id === line.productId); if (product?.modifiers?.length) openModifier(product, line); else openQuickNote(line); }

    function openQuickNote(line) {
      const note = prompt('Nota cucina per ' + line.name, line.note || '');
      if (note === null) return;
      line.note = note.trim();
      const product = MENU.find(p => p.id === line.productId);
      line.signature = makeSignature(product || line, line.modifiers || [], line.note);
      markModifiedIfNeeded(); saveCurrentOrder(); renderOrder(); renderHistory();
    }



    function normalizePeopleInput(value) {
      const n = parseInt(value, 10);
      return Number.isFinite(n) && n > 0 ? String(Math.min(n, 99)) : '';
    }

    function peopleCount() {
      const n = parseInt(state.people, 10);
      return Number.isFinite(n) && n > 0 ? n : 0;
    }

    function feeBaseCounts() {
      const raw = state.items.reduce((acc, line) => {
        const type = line.chargeType || (MENU.find(p => p.id === line.productId)?.chargeType) || classifyChargeType(line.name, '');
        if (type === 'cover') acc.cover += line.qty;
        if (type === 'service') acc.service += line.qty;
        return acc;
      }, { cover: 0, service: 0 });

      const people = peopleCount();
      const effectivePeople = people || (raw.cover + raw.service);
      const coverQty = Math.min(raw.cover, effectivePeople);
      const serviceSlots = Math.max(effectivePeople - coverQty, 0);
      const serviceQty = Math.min(raw.service, serviceSlots);
      return { raw, people, effectivePeople, coverQty, serviceQty };
    }

    function cleanFeeAdjustments() {
      if (!state.feeAdjustments) state.feeAdjustments = { cover: 0, service: 0 };
      state.feeAdjustments.cover = parseInt(state.feeAdjustments.cover || 0, 10) || 0;
      state.feeAdjustments.service = parseInt(state.feeAdjustments.service || 0, 10) || 0;
    }

    function autoFees(includeZero = false) {
      cleanFeeAdjustments();
      const base = feeBaseCounts();
      const feeData = [
        { type: 'cover', name: AUTO_FEES.cover.name, price: AUTO_FEES.cover.price, autoQty: base.coverQty, adjustment: state.feeAdjustments.cover, reason: base.people ? `${base.raw.cover} salati · ${base.people} persone` : `${base.raw.cover} salati` },
        { type: 'service', name: AUTO_FEES.service.name, price: AUTO_FEES.service.price, autoQty: base.serviceQty, adjustment: state.feeAdjustments.service, reason: base.people ? `${base.raw.service} dolci · ${base.people} persone` : `${base.raw.service} dolci` }
      ].map(fee => ({ ...fee, qty: Math.max(0, fee.autoQty + fee.adjustment) }));
      return feeData.filter(fee => includeZero || fee.qty > 0 || fee.adjustment !== 0);
    }

    function adjustFee(type, delta) {
      cleanFeeAdjustments();
      const base = feeBaseCounts();
      const autoQty = type === 'cover' ? base.coverQty : base.serviceQty;
      const current = state.feeAdjustments[type] || 0;
      const next = Math.max(-autoQty, Math.min(99, current + delta));
      state.feeAdjustments[type] = next;
      markModifiedIfNeeded(); saveCurrentOrder(); renderOrder(); renderHistory();
      toast(type === 'cover' ? 'Coperto modificato' : 'Servizio modificato');
    }

    function resetFee(type) {
      cleanFeeAdjustments();
      state.feeAdjustments[type] = 0;
      markModifiedIfNeeded(); saveCurrentOrder(); renderOrder(); renderHistory();
      toast('Regolazione azzerata');
    }

    function total() { return state.items.reduce((s, x) => s + x.unitPrice * x.qty, 0) + autoFees().reduce((s, x) => s + x.price * x.qty, 0); }

    function ensureTableSoft() { if (!state.table && els.tableInput.value.trim()) state.table = els.tableInput.value.trim(); }
    function touchCurrentOrder() { if (!state.orderId && (state.table || state.people || state.items.length)) state.orderId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()); saveCurrentOrder(false); }
    function saveCurrentOrder(show = false) {
      if (!state.orderId && !state.table && !state.people && state.items.length === 0) return;
      if (!state.orderId) state.orderId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
      const order = toOrder();
      const idx = state.history.findIndex(o => o.id === state.orderId);
      if (idx >= 0) state.history[idx] = { ...state.history[idx], ...order, updatedAt: nowIso() };
      else state.history.unshift(order);
      persist(); if (show) toast('Salvato');
    }

    function toOrder() { return { id: state.orderId, table: state.table, people: state.people, status: state.status, items: clone(state.items), feeAdjustments: clone(state.feeAdjustments || { cover: 0, service: 0 }), total: total(), createdAt: state.history.find(o => o.id === state.orderId)?.createdAt || nowIso(), updatedAt: nowIso() }; }
    function persist() { localStorage.setItem('wo_history', JSON.stringify(state.history)); }
    function loadOrder(order) { state.orderId = order.id; state.table = order.table || ''; state.people = order.people || ''; state.status = order.status || 'draft'; state.items = clone(order.items || []); state.feeAdjustments = clone(order.feeAdjustments || { cover: 0, service: 0 }); els.tableInput.value = state.table; els.peopleInput.value = state.people || ''; setMobileView('cart'); renderOrder(); renderHistory(); toast(`Tavolo ${state.table || '?'} aperto`); }

    function markModifiedIfNeeded() { if (state.status === 'confirmed') state.status = 'modified'; }

    function clearCurrentAfterConfirm() {
      state.orderId = null;
      state.table = '';
      state.people = '';
      state.status = 'draft';
      state.items = [];
      state.feeAdjustments = { cover: 0, service: 0 };
      els.tableInput.value = '';
      els.peopleInput.value = '';
      els.searchInput.value = '';
      setMobileView('menu');
      renderOrder();
      renderProducts();
      setTimeout(() => els.tableInput.focus(), 80);
    }

    function confirmOrder() {
      if (!state.table) { toast('Inserisci il tavolo'); els.tableInput.focus(); return; }
      if (!state.items.length) { toast('Ordine vuoto'); return; }
      const savedTable = state.table || '?';
      state.status = 'confirmed';
      saveCurrentOrder(false);
      renderHistory();
      clearCurrentAfterConfirm();
      toast(`Comanda tavolo ${savedTable} salvata nello storico`);
    }

    function closeOrder() {
      if (!state.orderId || !state.items.length) { toast('Nessun ordine da chiudere'); return; }
      if (!confirm('Segnare il tavolo come pagato e chiuso?')) return;
      state.status = 'closed'; saveCurrentOrder(true); renderHistory(); newOrder(false); setMobileView('menu');
    }

    function deleteCurrentOrder() {
      if (!state.orderId && !state.items.length) return newOrder(false);
      if (!confirm('Cancellare questo ordine?')) return;
      if (state.orderId) state.history = state.history.filter(o => o.id !== state.orderId);
      persist(); newOrder(false); renderHistory(); toast('Ordine cancellato');
    }

    function newOrder(ask = true) {
      if (ask && state.items.length && !confirm('Azzerare la comanda attuale e ricominciare?')) return;
      state.orderId = null; state.table = ''; state.people = ''; state.status = 'draft'; state.items = []; state.feeAdjustments = { cover: 0, service: 0 }; els.tableInput.value = ''; els.peopleInput.value = ''; els.searchInput.value = ''; setMobileView('menu'); renderOrder(); renderProducts();
      setTimeout(() => els.tableInput.focus(), 100);
    }

    function clearHistory() {
      const confirmedCount = state.history.filter(o => o.status !== 'draft').length;
      if (!confirmedCount) { toast('Storico già vuoto'); return; }
      if (!confirm(`Svuotare tutto lo storico? Verranno eliminate ${confirmedCount} comande confermate.`)) return;
      state.history = state.history.filter(o => o.status === 'draft' && o.id === state.orderId);
      persist();
      renderHistory();
      toast('Storico svuotato');
    }

    function renderHistory() {
      const orders = state.history
        .filter(o => o.status !== 'draft')
        .sort((a, b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0));
      els.historyList.innerHTML = orders.length ? '' : '<div class="empty">Nessuna comanda confermata. Premi “Conferma comanda” per salvarla qui.</div>';
      orders.forEach(o => els.historyList.appendChild(historyCard(o, false)));
    }

    function historyCard(order, isOpen) {
      const card = document.createElement('div'); card.className = 'history-card';
      const itemCount = (order.items || []).reduce((s, x) => s + x.qty, 0);
      card.innerHTML = `
        <div class="history-top">
          <div>
            <div class="history-title">Tavolo ${escapeHtml(order.table || '?')}</div>
            <div class="history-meta">${formatDate(order.updatedAt || order.createdAt)} · ${order.people ? escapeHtml(order.people) + ' persone · ' : ''}${itemCount} articoli · ${eur(order.total || 0)}</div>
          </div>
          <span class="status-pill ${statusClass(order.status)}">${statusLabel(order.status)}</span>
        </div>
        <div class="row-sub">${escapeHtml(summary(order))}</div>
        <div class="history-actions">
          <button class="blue" type="button" data-act="open">Modifica</button>
          <button type="button" data-act="view">Comanda</button>
          <button class="danger" type="button" data-act="delete">Elimina</button>
        </div>
      `;
      card.querySelector('[data-act="open"]').addEventListener('click', () => loadOrder(order));
      card.querySelector('[data-act="view"]').addEventListener('click', () => { const current = toOrderSafely(); state.orderId = order.id; state.table = order.table; state.people = order.people || ''; state.status = order.status; state.items = clone(order.items || []); state.feeAdjustments = clone(order.feeAdjustments || { cover: 0, service: 0 }); showComanda(); if (current) restoreOrder(current); renderOrder(); });
      card.querySelector('[data-act="delete"]').addEventListener('click', () => deleteHistoryOrder(order.id));
      return card;
    }

    function toOrderSafely() { return { orderId: state.orderId, table: state.table, people: state.people, status: state.status, items: clone(state.items), feeAdjustments: clone(state.feeAdjustments || { cover: 0, service: 0 }) }; }
    function restoreOrder(s) { state.orderId = s.orderId; state.table = s.table; state.people = s.people || ''; state.status = s.status; state.items = s.items; state.feeAdjustments = clone(s.feeAdjustments || { cover: 0, service: 0 }); els.tableInput.value = state.table || ''; els.peopleInput.value = state.people || ''; }
    function summary(order) { return (order.items || []).slice(0, 5).map(x => `${x.qty}× ${x.name}`).join('\n') + ((order.items || []).length > 5 ? '\n…' : ''); }
    function deleteHistoryOrder(id) { if (!confirm('Eliminare definitivamente questo ordine?')) return; state.history = state.history.filter(o => o.id !== id); if (state.orderId === id) newOrder(false); persist(); renderHistory(); toast('Eliminato'); }
    function showComanda() {
      if (!state.items.length) { toast('Ordine vuoto'); return; }
      els.comandaText.textContent = buildComandaText();
      els.comandaDrawer.classList.add('show');
    }
    function closeComanda() { els.comandaDrawer.classList.remove('show'); }
    async function copyComanda() {
      const text = buildComandaText();
      try { await navigator.clipboard.writeText(text); toast('Comanda copiata'); }
      catch { toast('Copia non disponibile'); }
    }
    function buildComandaText() {
      const lines = [];
      lines.push('====================');
      lines.push(`TAVOLO ${state.table || '?'}`);
      if (state.people) lines.push(`PERSONE ${state.people}`);
      lines.push(statusLabel(state.status).replace(/^[^ ]+ /, '').toUpperCase());
      lines.push('====================');
      state.items.forEach(line => {
        lines.push(`${line.qty}x ${line.name}`);
        (line.modifiers || []).forEach(m => lines.push(`  - ${m.groupTitle}: ${m.name}${m.price ? ` (+${eur(m.price)})` : ''}`));
        if (line.note) lines.push(`  NOTA: ${line.note}`);
      });
      const fees = autoFees();
      if (fees.length) {
        lines.push('--------------------');
        lines.push('COPERTO / SERVIZIO');
        fees.forEach(fee => lines.push(`${fee.qty}x ${fee.name}`));
      }
      lines.push('--------------------');
      lines.push(`Totale: ${eur(total())}`);
      return lines.join('\n');
    }

    function normalize(s) { return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
    function iconFor(cat) { if (cat.includes('Burger')) return '🍔'; if (cat.includes('Fresh') || cat.includes('Caffetteria') || cat.includes('Milkshake') || cat.includes('Iced') || cat.includes('Tea')) return '🥤'; if (cat.includes('Pancake')) return '🥞'; if (cat.includes('Sweet') || cat.includes('Cake') || cat.includes('Yogurt') || cat.includes('Novità')) return '🍰'; if (cat.includes('Salad')) return '🥗'; if (cat.includes('Sides')) return '🍟'; if (cat.includes('Breakfast') || cat.includes('Brunch')) return '🍳'; if (cat.includes('Sandwich') || cat.includes('Hot Dog')) return '🥪'; return '🍽️'; }
    function shortCat(cat) { return cat.replace('Novità & Speciali','Novità').replace('Pancake & Waffle','Pancake').replace('Cake & Cheesecake','Cakes').replace('Milkshake & Sundae','Milkshake').replace('Fresh Drinks','Drinks').replace('Tea & Infusi','Tea').replace('Iced Cappuccino','Iced').replace('All Days Brunch','Brunch').replace('American Breakfast','American').replace('Club & Sandwich','Club').replace('Sides & Salad','Sides/Salad').replace('NY Burgers','Burger'); }
    function statusClass(status) { return status === 'confirmed' ? 'status-confirmed' : status === 'modified' ? 'status-modified' : status === 'closed' ? 'status-closed' : 'status-draft'; }
    function statusLabel(status) { return status === 'confirmed' ? '🟢 Confermato' : status === 'modified' ? '🟠 Modificato' : status === 'closed' ? '⚫ Chiuso' : '🟡 In presa'; }
    function formatDate(iso) { if (!iso) return ''; const d = new Date(iso); return d.toLocaleString('it-IT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }); }
    function escapeHtml(str) { return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
    let toastTimer; function toast(msg) { els.toast.textContent = msg; els.toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => els.toast.classList.remove('show'), 1600); }
  </script>
</body>
</html>
